# ============================================================
# PROFIL : local
# Activation : ./mvnw spring-boot:run -Dspring-boot.run.profiles=local
# ============================================================

# ========================
# BASE DE DONNEES — MySQL local (WAMP / XAMPP)
# ========================
spring.datasource.url=jdbc:mysql://localhost:3306/jwt_api_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=

# ========================
# CONNECTION POOL (HikariCP) — parametres detendus en local
# ========================
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000

# ========================
# JPA — verbeux en local pour faciliter le debug
# ========================
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ========================
# ACTUATOR
# ========================
management.health.db.enabled=true

# ========================
# MAIL — Mailtrap Testing (sandbox)
# Les emails sont interceptes et visibles dans le dashboard Mailtrap.
# Recuperer Username et Password dans : Email Testing → Inboxes → SMTP Settings
# ========================
spring.mail.host=sandbox.smtp.mailtrap.io
spring.mail.port=2525
