# ============================================================
# PROFIL : prod
# Activation : variable d'environnement SPRING_PROFILES_ACTIVE=prod  (definie sur Render)
# ============================================================

# ========================
# LAZY INITIALIZATION
# Differe la creation de TOUS les beans (JPA, Hibernate, HikariCP) au premier usage.
# Garantit 0 connexion MySQL au demarrage → Render valide le deploy immediatement.
# ========================
spring.main.lazy-initialization=true

# ========================
# BASE DE DONNEES — Clever Cloud MySQL (via variables Render)
# ========================
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# ========================
# CONNECTION POOL (HikariCP) — calibre pour Clever Cloud DEV (5 connexions max)
# pool=1 + 1 connexion isolee Hibernate DDL = 2 connexions max
# initializationFailTimeout=-1 : pas de fail-fast a l'init du pool
# ========================
spring.datasource.hikari.maximum-pool-size=1
spring.datasource.hikari.minimum-idle=0
spring.datasource.hikari.initializationFailTimeout=-1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=120000
spring.datasource.hikari.max-lifetime=180000

# ========================
# JPA — silencieux en production
# ========================
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ========================
# ACTUATOR
# Desactive le check DB : Render valide le deploy meme si MySQL est indisponible.
# ========================
management.health.db.enabled=false

# ========================
# MAIL — Mailtrap Testing (sandbox)
# Les emails sont interceptes et visibles dans le dashboard Mailtrap.
# Recuperer Username et Password dans : Email Testing → Inboxes → SMTP Settings
# ========================
spring.mail.host=sandbox.smtp.mailtrap.io
spring.mail.port=2525
spring.mail.username=${MAILTRAP_USERNAME}
spring.mail.password=${MAILTRAP_PASSWORD}

app.reset-url=${APP_RESET_URL}
app.mail.from=${MAIL_FROM}
