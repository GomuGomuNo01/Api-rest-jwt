spring.application.name=jwt-api

# ========================
# PROFIL ACTIF PAR DEFAUT (ecrase par SPRING_PROFILES_ACTIVE en prod)
# ========================
spring.profiles.active=local

# ========================
# SERVEUR
# ========================
server.port=${PORT:8080}

# ========================
# DRIVER MySQL
# ========================
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ========================
# JPA / HIBERNATE (commun)
# ========================
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# ========================
# MAIL — proprietes SMTP communes
# ========================
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# ========================
# JWT
# ========================
jwt.secret=${JWT_SECRET:VGhpc0lzQVZlcnlTZWN1cmVTZWNyZXRLZXlGb3JKV1RBdXRoZW50aWNhdGlvbjEyMzQ1Njc4OTA=}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ========================
# SWAGGER / OPENAPI
# ========================
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
